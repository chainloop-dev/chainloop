apiVersion: chainloop.dev/v1
kind: Contract
metadata:
  name: pr-validation
  description: Contract for Chainloop Platform PR Validation Workflow
spec:
  policies:
    attestation:
      - ref: source-commit
        with:
          check_signature: "true"
          check_author_verified: "true"
        gate: true
    materials:
      - ref: pr-description-required
        gate: true
        with:
          min_length: "10"
      - ref: pr-user-story-linked
        gate: true
        with:
          patterns: "#[0-9]+,gh-[0-9]+"
